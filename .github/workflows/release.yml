name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build binaries, Docker images, and GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Copy dist into backend for embedding
        run: |
          rm -rf backend/dist
          cp -r frontend/dist backend/dist

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Build binaries
        working-directory: backend
        run: |
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../dist/synclippy-linux-amd64      .
          GOOS=linux   GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o ../dist/synclippy-linux-arm64      .
          GOOS=darwin  GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../dist/synclippy-darwin-amd64     .
          GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o ../dist/synclippy-darwin-arm64     .
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../dist/synclippy-windows-amd64.exe .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/synclippy
            ${{ secrets.DOCKER_USERNAME }}/synclippy
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            dist/synclippy-linux-amd64
            dist/synclippy-linux-arm64
            dist/synclippy-darwin-amd64
            dist/synclippy-darwin-arm64
            dist/synclippy-windows-amd64.exe
