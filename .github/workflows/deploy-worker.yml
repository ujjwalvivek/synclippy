name: Deploy Worker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build frontend and deploy Cloudflare Worker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      # The Worker itself serves both the API and the static frontend.
      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        working-directory: frontend

      - name: Copy dist to worker assets
        run: |
          rm -rf worker/public
          cp -r frontend/dist worker/public

      - name: Copy wordlist to worker
        run: cp backend/wordlist.txt worker/wordlist.txt

      - name: Install Worker deps
        run: npm ci
        working-directory: worker

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: worker
